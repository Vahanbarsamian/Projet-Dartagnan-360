<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dartagnan V5.6 - Conseil Scientifique des Mousquetaires</title>
    <style>
        :root {
            --blue-royal: #002366;
            --gold: #FFD700;
            --bg: #050505;
            --card-bg: #111;
            --text: #ccc;
            --border: #222;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        h1 { color: var(--gold); margin: 0; font-size: 1.2em; font-variant: small-caps; text-align: center; padding-bottom: 5px; border-bottom: 1px solid var(--gold); }

        .config-bar {
            background: var(--card-bg);
            padding: 8px 15px;
            border-radius: 4px;
            display: flex;
            gap: 15px;
            align-items: center;
            margin: 10px 0;
            border: 1px solid var(--border);
        }

        #btnLaunch {
            background: var(--gold);
            color: black;
            padding: 6px 15px;
            font-weight: bold;
            border-radius: 3px;
            font-size: 0.85em;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }
        #btnLaunch:disabled { opacity: 0.5; cursor: not-allowed; }

        #systemTicker { flex: 1; font-family: monospace; font-size: 0.75em; color: #666; }

        .mousquetaires-list { display: flex; gap: 8px; flex-wrap: wrap; }
        .mousquetaire-item {
            font-size: 0.7em;
            padding: 4px 8px;
            border: 1px solid #333;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .mousquetaire-item.active { border-color: var(--gold); color: var(--gold); background: rgba(255, 215, 0, 0.05); }

        .main-container {
            display: flex;
            gap: 15px;
            flex: 1;
            overflow: hidden;
        }

        .input-area { width: 340px; display: flex; flex-direction: column; gap: 8px; }
        .responses-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 10px; overflow-y: auto; padding-right: 5px; }
        .right-panel { width: 240px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }

        textarea { background: #000; color: #fff; border: 1px solid var(--border); padding: 10px; border-radius: 4px; font-family: monospace; font-size: 0.85em; resize: both; }
        #promptInput { height: 120px; min-width: 100%; }
        #geminiInput { height: 60px; min-width: 100%; }

        #dropZone { border: 1px dashed #333; padding: 10px; text-align: center; font-size: 0.7em; color: #555; border-radius: 4px; }
        #dropZone.dragover { border-color: var(--gold); color: var(--gold); }
        #imagePreview { max-width: 100%; max-height: 80px; display: none; margin: 5px auto; }

        .btn-small { padding: 5px; font-size: 0.75em; flex: 1; background: #222; color: #ccc; border: 1px solid #333; cursor: pointer; }
        .btn-gold { background: var(--gold); color: #000; font-weight: bold; border: none; }

        .response-card { background: #0c0c0c; border: 1px solid var(--border); border-radius: 4px; padding: 10px; position: relative; }
        .response-card h3 { margin: 0 0 8px 0; font-size: 0.75em; color: var(--gold); display: flex; align-items: center; border-bottom: 1px solid #222; padding-bottom: 4px; }
        .response-content { font-size: 0.85em; line-height: 1.4; }

        .sword-container { width: 20px; height: 30px; margin-right: 8px; }
        .sword-svg { width: 100%; height: 100%; overflow: visible; }
        .blade { fill: #222; transition: 0.5s; }
        .guard { fill: #444; transition: 0.5s; }
        .pommel { fill: #111; transition: 0.5s; }

        .state-received .guard { fill: #00bfff; filter: drop-shadow(0 0 3px #00bfff); }
        .state-thinking .blade { fill: url(#buckinghamGradient); animation: lightFlow 1s linear infinite; filter: drop-shadow(0 0 5px var(--gold)); }
        .state-done .blade { fill: #FFF; filter: drop-shadow(0 0 10px var(--gold)); }
        @keyframes lightFlow { 0%, 100% { fill-opacity: 0.3; } 50% { fill-opacity: 1; } }

        .action-btns { margin-left: auto; display: flex; gap: 4px; }
        .act-btn { background: none; border: 1px solid #333; color: #666; font-size: 0.7em; padding: 2px 4px; cursor: pointer; }
        .act-btn:hover { color: var(--gold); border-color: var(--gold); }

        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
        .modal-content { max-width: 900px; margin: 40px auto; background: #111; padding: 30px; border: 1px solid var(--gold); border-radius: 8px; position: relative; }
        .close-modal { position: absolute; right: 20px; top: 10px; font-size: 2em; color: var(--gold); cursor: pointer; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }
        .mermaid { background: white !important; color: black; border-radius: 4px; margin-top: 10px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
</head>
<body>

    <h1>⚔️ Conseil Scientifique des Mousquetaires : Pour le Roi et la France ⚔️</h1>

    <div class="config-bar">
        <button id="btnLaunch" onclick="startAllSystems()">🚀 LANCER LE SYSTÈME</button>
        <div id="systemTicker">Initialisation requise...</div>
        <div id="modelList" class="mousquetaires-list"></div>
    </div>

    <svg style="width:0; height:0; position:absolute;">
        <defs>
            <linearGradient id="buckinghamGradient" x1="0%" y1="100%" x2="0%" y2="0%">
                <stop offset="0%" stop-color="#333" />
                <stop offset="50%" stop-color="#FFF" />
                <stop offset="100%" stop-color="#333" />
            </linearGradient>
        </defs>
    </svg>

    <div class="main-container">
        <div class="input-area">
            <div style="display: flex; gap: 5px;">
                <input type="text" id="archiveIndex" placeholder="Index archive..." style="flex: 1; background: #000; border: 1px solid #333; color: var(--gold); padding: 5px; font-size: 0.75em;">
                <button class="btn-small" onclick="recallArchive()">📖 RAPPEL</button>
            </div>
            <textarea id="promptInput" placeholder="Exposez votre problématique technique..."></textarea>
            <div id="dropZone" ondragover="this.className='dragover'; event.preventDefault();" ondragleave="this.className='';" ondrop="handleDrop(event)">
                🖼️ DÉPÔT IMAGE / SCHÉMA
                <img id="imagePreview">
            </div>
            <input type="file" id="fileInput" style="display: none;" onchange="handleFile(this)">
            <div style="display: flex; gap: 5px;">
                <button class="btn-small" onclick="document.getElementById('fileInput').click()">📁 FICHIER</button>
                <button class="btn-small btn-gold" onclick="askAll()">LANCER LA CONSULTATION</button>
            </div>
            <div style="display: flex; gap: 5px;">
                <button class="btn-small" style="color: #a0f;" onclick="cleanAndArchive()">🧹 ARCHIVER</button>
                <button class="btn-small" style="color: #f44;" onclick="justTrash()">🗑️ JETER</button>
                <button class="btn-small" style="color: #0ff;" onclick="resetInterface()">🎯 RESET</button>
            </div>
            <button id="btnSynthese" onclick="generateSynthese()" style="display:none; background: #600; color: #fff; font-size: 0.8em; padding: 10px; border: 1px solid var(--gold);">🔱 GÉNÉRER LA SYNTHÈSE SUPRÊME</button>
            <button id="btnAuthorizeAll" onclick="authorizeAll()" style="display:none; background: #050; color: #fff; font-size: 0.8em; padding: 10px; border: 1px solid #0f0;">🔱 APPLIQUER LES MODIFICATIONS</button>
            <div id="globalLoader" style="display:none; font-size: 0.7em; color: var(--gold); text-align: center; font-style: italic;">Consultation en cours...</div>
        </div>

        <div class="responses-grid" id="responsesGrid"></div>

        <div class="right-panel">
            <div style="border: 1px solid var(--border); padding: 8px;">
                <h4 style="margin:0 0 5px 0; font-size: 0.75em; color: var(--gold);">📚 GRIMOIRES</h4>
                <div id="archiveList" style="font-size: 0.7em; max-height: 150px; overflow-y: auto;"></div>
            </div>
            <div style="border: 1px solid var(--border); padding: 8px; background: #000;">
                <h4 style="margin:0 0 5px 0; font-size: 0.75em; color: #0f0;">📟 CONSOLE</h4>
                <div id="shellOutput" style="font-size: 0.65em; color: #666; height: 100px; overflow-y: auto; margin-bottom: 5px;"></div>
                <input type="text" id="shellInput" value="ollama serve" style="width: 90%; background: transparent; color: #0f0; border: none; font-size: 0.7em; font-family: monospace;">
                <button class="btn-small" style="width:100%; border-color: #0f0; color: #0f0;" onclick="executeShell()">EXÉCUTER</button>
            </div>
            <div style="border: 1px solid var(--border); padding: 8px;">
                <h4 style="margin:0 0 5px 0; font-size: 0.75em; color: #0bf;">☁️ LE DUC (GEMINI)</h4>
                <textarea id="geminiInput" placeholder="Expertise Cloud..." style="width: 90%; height: 60px; font-size: 0.7em;"></textarea>
            </div>
        </div>
    </div>

    <div id="fullScreenModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeFullScreen()">&times;</span>
            <h2 id="modalTitle" style="color: var(--gold); font-size: 1.2em; margin-top: 0;"></h2>
            <div id="modalBody" class="response-content"></div>
        </div>
    </div>

    <script>
        const BRIDGE_URL = 'http://127.0.0.1:8081';
        const roles = {
            'llama3.1:latest': 'GÉNÉRAL DARTAGNAN (Stratégie & Logique)',
            'llama3:latest': 'GÉNÉRAL DARTAGNAN (Stratégie & Logique)',
            'mistral:latest': 'ÉRUDIT ARAMIS (Clarté & Contexte)',
            'phi3:latest': 'CALCULATEUR ATHOS (Dynamique des Fluides)',
            'gemma2:latest': 'GARDE DU CORPS PORTHOS (Sécurité & Matériaux)',
            'codestral:latest': 'M. DE TRÉVILLE (Expertise Code Pur)',
            'deepseek-coder-v2:latest': 'COLBERT (Logicien Critique)',
            'deepseek-coder-v2:lite': 'COLBERT LITE (Logique & Code)',
            'qwen2.5-coder:7b': 'VAUBAN CODER (Génie du Code & Architecture)',
            'mathstral:latest': 'PASCAL (Bilans Exergétiques)',
            'qwen2.5:latest': 'VAUBAN (Ingénierie & Fortification)',
            'mistral-nemo:latest': 'LAVOISIER (Physique des Gaz & Plasmas)',
            'llava:latest': 'L\'OEIL DU ROI (Vision & Schémas)'
        };
        const defaultMapping = {
            'llama3.1:latest': 'Dartagnan',
            'llama3:latest': 'Dartagnan',
            'mistral:latest': 'Aramis',
            'phi3:latest': 'Athos',
            'gemma2:latest': 'Porthos',
            'codestral:latest': 'Tréville',
            'deepseek-coder-v2:latest': 'Colbert',
            'deepseek-coder-v2:lite': 'Colbert',
            'qwen2.5-coder:7b': 'Vauban',
            'mathstral:latest': 'Pascal',
            'qwen2.5:latest': 'Vauban',
            'mistral-nemo:latest': 'Lavoisier',
            'llava:latest': 'L\'Oeil'
        };

        // On charge les baptêmes précédents ou on utilise le mapping par défaut
        const savedMapping = JSON.parse(localStorage.getItem('dartagnan_mapping') || '{}');
        const mapping = { ...defaultMapping, ...savedMapping };

        const epicNames = ["Planchet", "Grimaud", "Mousqueton", "Bazin", "Milady", "Rochefort", "Constance", "Lord Winter", "Felton", "Jussac", "Cahusac", "Bernajoux", "Mme de Chevreuse"];
        let availableModels = [];
        let currentImageData = null;

        async function startAllSystems() {
            const btn = document.getElementById('btnLaunch');
            const ticker = document.getElementById('systemTicker');
            const log = (msg, status, color = "#888") => ticker.innerHTML = `CMD: ${msg} | STATUT: <span style="color:${color}">${status}</span>`;
            btn.innerText = "⏳ INITIALISATION...";
            btn.disabled = true;

            try {
                const r = await fetch(`${BRIDGE_URL}/archives`);
                if(r.ok) log("Pont Royal", "✅ ACTIF", "#0f0");
            } catch(e) {
                log("Pont Royal", "❌ ABSENT", "#f44");
                alert("Lancez le Pont Royal !");
                btn.innerText = "❌ ÉCHEC"; btn.disabled = false; return;
            }

            try {
                const r = await fetch(`${BRIDGE_URL}/ollama/tags`);
                const data = await r.json();
                if(data.models && data.models.length > 0) {
                    log("Ollama", "✅ PRÊT", "#0f0");
                } else {
                    log("Ollama", "⚠️ RÉVEIL...", "#fa0");
                    await executeShell("ollama serve");
                    await new Promise(res => setTimeout(res, 5000));
                }
            } catch(e) {
                log("Ollama", "⚠️ RÉVEIL...", "#fa0");
                await executeShell("ollama serve");
                await new Promise(res => setTimeout(res, 5000));
            }

            await fetchModels();
            await fetchArchives();
            ticker.innerHTML = "<b style='color:#0f0'>✨ ARSENAL OPÉRATIONNEL ✨</b>";
            btn.innerText = "🔱 SYSTÈME ACTIF";
            btn.style.background = "#050";
            btn.disabled = false;
        }

        async function fetchModels() {
            const container = document.getElementById('modelList');
            try {
                const r = await fetch(`${BRIDGE_URL}/ollama/tags`);
                const data = await r.json();
                availableModels = data.models || [];
                renderModelList();
            } catch (e) {
                container.innerHTML = "<span style='color:#f44; font-size:0.8em;'>❌ Erreur Pont Royal</span>";
            }
        }

        function renderModelList() {
            const container = document.getElementById('modelList');
            container.innerHTML = '';

            // Liste des noms déjà pris (pour les masquer dans les choix)
            const takenNames = Object.values(mapping);

            availableModels.forEach(m => {
                const isKnown = mapping[m.name];
                const nick = mapping[m.name] || `Soldat ${m.name.split(':')[0]}`;
                const role = roles[m.name] || "Expert Indépendant";
                const skill = role.includes('(') ? role.match(/\(([^)]+)\)/)[0] : role;
                const div = document.createElement('div');
                div.className = 'mousquetaire-item active';

                let baptemeHtml = "";
                if (!isKnown) {
                    const availableEpicNames = epicNames.filter(name => !takenNames.includes(name));
                    baptemeHtml = `<select onchange="baptiser('${m.name}', this.value)" style="background:#000; color:var(--gold); border:none; font-size:0.8em; cursor:pointer;">
                        <option value="">🎖️ BAPTISER</option>
                        ${availableEpicNames.map(n => `<option value="${n}">${n}</option>`).join('')}
                    </select>`;
                }

                div.innerHTML = `<input type="checkbox" checked data-model="${m.name}"> <b>${nick}</b> ${baptemeHtml} <span style="font-size:0.8em; opacity:0.6;">${skill}</span> <button class="act-btn" onclick="executeShell('pull ${m.name}')" title="Mise à jour">🔄</button>`;
                container.appendChild(div);
            });
        }

        function baptiser(modelName, newNick) {
            if (newNick) {
                mapping[modelName] = newNick;
                // On enregistre le baptême dans le navigateur pour qu'il soit définitif
                localStorage.setItem('dartagnan_mapping', JSON.stringify(mapping));
                renderModelList();
            }
        }

        async function askAll() {
            const prompt = document.getElementById('promptInput').value;
            if (!prompt) return;
            const selected = document.querySelectorAll('#modelList input:checked');
            const grid = document.getElementById('responsesGrid');
            grid.innerHTML = '';
            document.getElementById('globalLoader').style.display = 'block';
            let context = "";
            for (let cb of selected) {
                const model = cb.getAttribute('data-model');
                const nick = mapping[model] || model;
                const res = await askOneWithCritique(model, nick, prompt, context);
                context += `\n[${nick}]: ${res}\n`;
            }
            document.getElementById('globalLoader').style.display = 'none';
        }

        async function askOneWithCritique(model, nickname, userPrompt, context) {
            const grid = document.getElementById('responsesGrid');
            const card = document.createElement('div');
            card.className = 'response-card';
            const cardId = `res-${model.replace(':','-')}`;
            const swordId = `sword-${model.replace(':','-')}`;
            card.innerHTML = `<h3><div class="sword-container" id="${swordId}"><svg class="sword-svg" viewBox="0 0 20 100"><path class="blade" d="M10 5 L13 85 L7 85 Z" /><rect class="guard" x="3" y="85" width="14" height="4" rx="2" /><rect class="hilt" x="8" y="89" width="4" height="8" fill="#5D2906" /><circle class="pommel" cx="10" cy="98" r="2" /></svg></div>${nickname}<div class="action-btns"><button class="act-btn" title="Plein écran" onclick="openFullScreen('${nickname}', '${cardId}')">⛶</button><button class="act-btn" title="Copier dans le presse-papier" onclick="copyToClipboard('${cardId}')">📋</button><button class="act-btn" title="Appliquer au projet" onclick="applyToProject('${cardId}')">🚀</button></div></h3><div class="response-content" id="${cardId}">Réflexion...</div>`;
            grid.appendChild(card);
            const sword = document.getElementById(swordId);
            sword.classList.add('state-received');
            const myRole = roles[model] || 'EXPERT SCIENTIFIQUE';
            const systemMsg = `Tu es ${nickname}, expert ${myRole}. 1. Si H2C est présenté, respecte sa physique. 2. Pour toute question générale, apporte l'état de l'art. 3. Pas de dénigrement. Réponds en Français.`;
            const payload = { model: model, messages: [{ role: 'system', content: systemMsg }, { role: 'user', content: (context ? `Contexte: ${context}\n\n` : "") + userPrompt }], stream: false, options: { num_ctx: 4096, temperature: 0.7 }};
            if (currentImageData) payload.images = [currentImageData];
            try {
                sword.classList.remove('state-received'); sword.classList.add('state-thinking');
                const r = await fetch(`${BRIDGE_URL}/ollama/chat`, { method: 'POST', body: JSON.stringify(payload) });
                const data = await r.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                const content = data.message.content;
                document.getElementById(cardId).innerHTML = marked.parse(content);
                sword.classList.remove('state-thinking'); sword.classList.add('state-done');
                document.getElementById('btnSynthese').style.display = 'block';
                return content;
            } catch (e) {
                document.getElementById(cardId).innerHTML = `<span style="color:#f44;">❌ ${e.message || "Erreur de calcul"}</span><br><small style="opacity:0.5;">(Modèle trop lourd pour le GPU ?)</small>`;
                sword.style.opacity = "0.3";
                document.getElementById('btnSynthese').style.display = 'block';
                return "";
            }
        }

        function openFullScreen(nickname, cardId) {
            document.getElementById('modalTitle').innerText = "RAPPORT : " + nickname;
            document.getElementById('modalBody').innerHTML = document.getElementById(cardId).innerHTML;
            document.getElementById('fullScreenModal').style.display = "block";
        }
        function closeFullScreen() { document.getElementById('fullScreenModal').style.display = "none"; }
        function resetInterface() {
            const pi = document.getElementById('promptInput'); const gi = document.getElementById('geminiInput');
            pi.style.width = '100%'; pi.style.height = '120px'; gi.style.width = '100%'; gi.style.height = '60px';
        }

        async function executeShell(cmd) {
            const out = document.getElementById('shellOutput');
            const log = (m, c="#888") => { const d = document.createElement('div'); d.style.color = c; d.innerText = `> ${m}`; out.prepend(d); };
            try {
                const r = await fetch(`${BRIDGE_URL}/forge`, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: `command=${encodeURIComponent(cmd)}` });
                log(await r.text(), "#0f0");
            } catch (e) { log("Erreur réseau", "#f44"); }
        }

        async function fetchArchives() {
            const container = document.getElementById('archiveList');
            try {
                const r = await fetch(`${BRIDGE_URL}/archives`);
                const ids = await r.json();
                container.innerHTML = ids.length ? "" : "Aucune archive.";
                ids.forEach(id => {
                    const div = document.createElement('div'); div.className = 'archive-item';
                    div.innerText = `#${id}`; div.onclick = () => recallArchive(id);
                    container.appendChild(div);
                });
            } catch (e) {}
        }

        async function recallArchive(id) {
            const rid = id || document.getElementById('archiveIndex').value;
            if(!rid) return;
            try {
                const r = await fetch(`${BRIDGE_URL}/archive/${rid}`);
                const d = await r.json();
                document.getElementById('promptInput').value = `[ARCHIVE #${rid}]\n${d.prompt}`;
            } catch(e) {}
        }

        function copyToClipboard(id) { navigator.clipboard.writeText(document.getElementById(id).innerText); alert("Copié !"); }
        function handleDrop(e) {
            e.preventDefault(); const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (ev) => { currentImageData = ev.target.result.split(',')[1]; const img = document.getElementById('imagePreview'); img.src = ev.target.result; img.style.display = 'block'; };
                reader.readAsDataURL(file);
            }
        }
        function handleFile(input) {
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById('promptInput').value += `\n\nCONTENU: ${e.target.result}`;
            reader.readAsText(input.files[0]);
        }

        async function generateSynthese() {
            const btn = document.getElementById('btnSynthese');
            if (btn.disabled) return;

            // Remonter en haut de la grille des réponses en douceur
            document.getElementById('responsesGrid').scrollTo({ top: 0, behavior: 'smooth' });

            // Désactiver le bouton pour éviter les impulsions multiples
            btn.disabled = true;
            btn.innerText = "⏳ LE CARDINAL ANALYSE...";
            btn.style.opacity = "0.5";

            const grid = document.getElementById('responsesGrid');
            const cards = grid.querySelectorAll('.response-card');
            let all = "";
            cards.forEach(c => {
                const content = c.querySelector('.response-content').innerText;
                if (!content.includes("❌")) { // On n'inclut pas les erreurs dans la synthèse
                    all += `--- ${c.querySelector('h3').innerText} ---\n${content}\n\n`;
                }
            });
            const gem = document.getElementById('geminiInput').value;
            if(gem) all += `--- DUC DE BUCKINGHAM ---\n${gem}\n\n`;
            const card = document.createElement('div'); card.className = 'response-card'; card.style.gridColumn = "1 / -1";
            card.innerHTML = `<h3 style="color:#f40">🔱 SYNTHÈSE DU CARDINAL</h3><div class="response-content" id="res-syn">Analyse...</div>`;
            grid.prepend(card);
            const prompt = `Tu es le Cardinal de Richelieu. Fais une synthèse CRITIQUE. Focus: H2C / Triboélectricité. Rapports:\n${all}`;
            try {
                const r = await fetch(`${BRIDGE_URL}/ollama/chat`, { method: 'POST', body: JSON.stringify({ model: 'codestral:latest', messages: [{role:'user', content:prompt}], stream: false }) });
                const d = await r.json();
                document.getElementById('res-syn').innerHTML = marked.parse(d.message.content);
                document.getElementById('btnAuthorizeAll').style.display = 'block';

                // On réactive le bouton une fois fini (optionnel, pour permettre une nouvelle synthèse)
                btn.disabled = false;
                btn.innerText = "🔱 GÉNÉRER UNE NOUVELLE SYNTHÈSE";
                btn.style.opacity = "1";
            } catch(e) {
                document.getElementById('res-syn').innerText = "Erreur.";
                btn.disabled = false;
                btn.innerText = "🔱 RÉESSAYER LA SYNTHÈSE";
            }
        }

        async function authorizeAll() {
            const syntheseContent = document.getElementById('res-syn').innerText;
            const blocks = syntheseContent.split(/\/\/ PATH: /).slice(1);
            if (blocks.length === 0) return alert("Aucun fichier détecté.");
            if (confirm(`Appliquer ${blocks.length} modifications ?`)) {
                for (let block of blocks) {
                    const lines = block.split('\n'); const path = lines[0].trim(); const content = lines.slice(1).join('\n').trim();
                    await fetch(`${BRIDGE_URL}/apply`, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: `path=${encodeURIComponent(path)}&content=${encodeURIComponent(content)}` });
                }
                alert("🏰 SIÈGE TERMINÉ !");
            }
        }

        async function applyToProject(id) {
            const content = document.getElementById(id).innerText;
            const pathMatch = content.match(/\/\/ PATH: ([^\s]+)/);
            const path = pathMatch ? pathMatch[1] : prompt("Chemin du fichier ?");
            if (path && confirm(`Écraser ${path} ?`)) {
                await fetch(`${BRIDGE_URL}/apply`, { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: `path=${encodeURIComponent(path)}&content=${encodeURIComponent(content)}` });
            }
        }

        mermaid.initialize({ startOnLoad: false, theme: 'dark' });
    </script>
</body>
</html>
